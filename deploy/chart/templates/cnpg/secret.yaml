{{- /*
Owner credentials for the CloudNativePG Cluster (kubernetes.io/basic-auth). Skipped
when cnpg.existingSecret is set (bring your own). The username MUST match the
Cluster's initdb.owner; the same username/password build the app's STRATOS_DB_URL.
*/ -}}
{{- if and .Values.cnpg.enabled (not .Values.cnpg.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stratos.cnpgSecretName" . }}
  labels:
    {{- include "stratos.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: kubernetes.io/basic-auth
stringData:
  username: {{ .Values.postgresql.auth.username | quote }}
  password: {{ .Values.postgresql.auth.password | required "postgresql.auth.password is required (CloudNativePG owner) — set a strong password or use cnpg.existingSecret; for dev use -f deploy/chart/values-dev.yaml" | quote }}
{{- end }}
