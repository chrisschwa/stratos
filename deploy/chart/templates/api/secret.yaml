{{- /*
Chart-managed api Secret. Skipped entirely when api.existingSecret is set
(that Secret must then carry: db-url, rabbitmq-password, encryption-key).
Individual keys are also skipped when a per-dependency existingSecret takes
over (externalPostgresql/externalRabbitmq).
*/ -}}
{{- if not .Values.api.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stratos.fullname" . }}-api
  labels:
    {{- include "stratos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  {{- if not .Values.externalPostgresql.existingSecret }}
  db-url: {{ include "stratos.dbURL" . | quote }}
  {{- end }}
  {{- if not .Values.externalRabbitmq.existingSecret }}
  {{- if .Values.rabbitmq.enabled }}
  rabbitmq-password: {{ .Values.rabbitmq.auth.password | required "rabbitmq.auth.password is required (bundled RabbitMQ) — set a strong password or use externalRabbitmq.existingSecret; for dev use -f deploy/chart/values-dev.yaml" | quote }}
  {{- else }}
  rabbitmq-password: {{ .Values.externalRabbitmq.password | quote }}
  {{- end }}
  {{- end }}
  encryption-key: {{ .Values.api.encryptionKey | required "api.encryptionKey is required — set a strong random value (openssl rand -hex 32) or use api.existingSecret; for dev use -f deploy/chart/values-dev.yaml" | quote }}
{{- end }}
