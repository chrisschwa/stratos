apiVersion: v1
kind: Service
metadata:
  name: {{ include "stratos.fullname" . }}-api
  labels:
    {{- include "stratos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "stratos.selector" (dict "ctx" $ "component" "api") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
    # Management port (probes, operator /debug triggers). Cluster-internal
    # only — never route an Ingress/HTTPRoute at it.
    - name: mgmt
      port: {{ .Values.api.managementPort }}
      targetPort: mgmt
