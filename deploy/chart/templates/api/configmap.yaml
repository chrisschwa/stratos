{{- /* Optional application.yml, mounted at /opt/stratos/api/application.yml. */ -}}
{{- if .Values.api.applicationYml }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stratos.fullname" . }}-api-config
  labels:
    {{- include "stratos.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
data:
  application.yml: |
    {{- .Values.api.applicationYml | nindent 4 }}
{{- end }}
