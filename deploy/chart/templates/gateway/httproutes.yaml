{{- /*
Gateway-API alternative to Ingress: one HTTPRoute per component that has
a hostname configured under gateway.hostnames.
*/ -}}
{{- if .Values.gateway.enabled }}
{{- range $comp := tuple "api" "ui" "admin" }}
{{- $host := index $.Values.gateway.hostnames $comp }}
{{- if $host }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "stratos.fullname" $ }}-{{ $comp }}
  labels:
    {{- include "stratos.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $comp }}
  annotations:
    # external-dns creates the A record from this hint; it does not derive DNS
    # names from HTTPRoute hostnames on its own.
    external-dns.alpha.kubernetes.io/hostname: {{ $host | quote }}
spec:
  parentRefs:
    {{- toYaml (required "gateway.parentRefs is required when gateway.enabled" $.Values.gateway.parentRefs) | nindent 4 }}
  hostnames:
    - {{ $host | quote }}
  rules:
    - backendRefs:
        - name: {{ include "stratos.fullname" $ }}-{{ $comp }}
          port: {{ (index $.Values $comp).service.port }}
{{- end }}
{{- end }}
{{- end }}
