{{- range $comp := tuple "ui" "admin" }}
{{- $v := index $.Values $comp }}
{{- if $v.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "stratos.fullname" $ }}-{{ $comp }}
  labels:
    {{- include "stratos.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $comp }}
  {{- with $v.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with $v.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  rules:
    - host: {{ required (printf "%s.ingress.host is required when %s.ingress.enabled" $comp $comp) $v.ingress.host | quote }}
      http:
        paths:
          - path: {{ $v.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "stratos.fullname" $ }}-{{ $comp }}
                port:
                  name: http
  {{- with $v.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
