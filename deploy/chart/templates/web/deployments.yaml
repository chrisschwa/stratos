{{- /*
The two static SPA workloads (ui = customer console against the `main`
realm; admin = operator console against the `admin` realm) share one
shape, so both Deployments render from this single ranged template.
*/ -}}
{{- range $comp := tuple "ui" "admin" }}
{{- $v := index $.Values $comp }}
{{- $realm := ternary $.Values.auth.main $.Values.auth.admin (eq $comp "ui") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stratos.fullname" $ }}-{{ $comp }}
  labels:
    {{- include "stratos.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $comp }}
spec:
  replicas: {{ $v.replicas }}
  selector:
    matchLabels:
      {{- include "stratos.selector" (dict "ctx" $ "component" $comp) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "stratos.selector" (dict "ctx" $ "component" $comp) | nindent 8 }}
    spec:
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $comp }}
          image: "{{ $v.image.repository }}:{{ $v.image.tag | default $.Chart.AppVersion }}"
          imagePullPolicy: {{ $v.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $v.port }}
          env:
            # Browser-facing runtime config (window.__STRATOS__).
            - name: STRATOS_API_URL
              value: {{ $v.apiUrl | default (printf "%s/api/v1" $.Values.api.selfUrls.api) | quote }}
            - name: STRATOS_OAUTH2_ISSUER
              value: {{ $realm.issuer | quote }}
            - name: STRATOS_OAUTH2_CLIENT_ID
              value: {{ $realm.clientId | quote }}
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          {{- with $v.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with $v.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $v.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $v.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
